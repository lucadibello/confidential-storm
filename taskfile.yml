version: "3"

dotenv: [".env"]

vars:
  WORKSPACE: .
  SESSION: dev
  CONTAINER_NAME: confidential-storm-devcontainer
  TUNNEL_SRV: sws01
  TUNNEL_USER: luca
  SSH_TUNNEL_REMOTE_PORT: 2222
  SSH_TUNNEL_LOCAL_PORT: 8022
  STORM_UI_REMOTE_PORT: 9090
  STORM_UI_LOCAL_PORT: 9090
  STORM_NETWORK: storm-net

tasks:
  devcontainer:
    desc: Build, start, and attach to the devcontainer
    cmds:
      - task: devcontainer-build
      - task: devcontainer-up
      - task: devcontainer-attach

  devcontainer-recreate:
    desc: Recreates a devcontainer from scratch to ensure a clean environment
    cmds:
      - task: devcontainer-down
      - task: devcontainer

  ensure-network:
    desc: Create the Docker network required by the devcontainer (idempotent)
    internal: true
    cmds:
      - docker network create {{.STORM_NETWORK}} 2>/dev/null || true

  devcontainer-build:
    desc: Build the devcontainer image for this workspace
    preconditions:
      - sh: test -S "$SSH_AUTH_SOCK"
        msg: "SSH_AUTH_SOCK is not set or does not point to a valid socket"
    cmds:
      - devcontainer build --workspace-folder {{.WORKSPACE}}

  devcontainer-up:
    desc: Start (or reuse) the devcontainer for this workspace
    deps: [ensure-network]
    preconditions:
      - sh: test -S "$SSH_AUTH_SOCK"
        msg: "SSH_AUTH_SOCK is not set or does not point to a valid socket"
    cmds:
      - devcontainer up --workspace-folder {{.WORKSPACE}}

  devcontainer-attach:
    desc: Exec into the devcontainer and start a bash shell
    preconditions:
      - sh: test -S "$SSH_AUTH_SOCK"
        msg: "SSH_AUTH_SOCK is not set or does not point to a valid socket"
    cmds:
      - devcontainer exec --workspace-folder {{.WORKSPACE}} bash

  devcontainer-attach-tmux:
    desc: Exec into the devcontainer and start/attach tmux
    preconditions:
      - sh: test -S "$SSH_AUTH_SOCK"
        msg: "SSH_AUTH_SOCK is not set or does not point to a valid socket"
    cmds:
      - devcontainer exec --workspace-folder {{.WORKSPACE}} tmux new-session -A -s {{.SESSION}}

  devcontainer-down:
    desc: Stop and remove the devcontainer for this workspace
    cmds:
      - docker stop {{.CONTAINER_NAME}} || true
      - docker rm -f -v {{.CONTAINER_NAME}} || true

  tunnel-ssh:
    desc: Expose the devcontainer’s SSH port locally so you can connect via SSH without extra steps
    cmds:
      - ssh -N -L {{.SSH_TUNNEL_LOCAL_PORT}}:127.0.0.1:{{.SSH_TUNNEL_REMOTE_PORT}} {{.TUNNEL_USER}}@{{.TUNNEL_SRV}}

  tunnel-storm-ui:
    desc: Forward the Storm web UI port from the remote server to your local machine
    cmds:
      - ssh -N -L {{.STORM_UI_LOCAL_PORT}}:127.0.0.1:{{.STORM_UI_REMOTE_PORT}} {{.TUNNEL_USER}}@{{.TUNNEL_SRV}}
