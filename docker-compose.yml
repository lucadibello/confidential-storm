# Apache Storm cluster for local development.
#
# Prerequisites:
#   1. Create the external network once:
#        docker network create storm-net
#   2. Copy .env.example to .env and adjust values if needed:
#        cp .env.example .env
#
# Usage:
#   docker compose up -d          # start the cluster
#   docker compose logs -f        # follow all logs
#   docker compose down           # stop the cluster
#   docker compose down -v        # stop and remove volumes
#
# The devcontainer joins the same "storm-net" network so the `storm` CLI
# inside the container can reach nimbus by hostname.

x-storm-common: &storm-common
  image: "storm:${STORM_VERSION:-2.8.3}"
  restart: unless-stopped
  environment:
    STORM_CONF_DIR: /conf
  volumes:
    - ./conf/storm.yaml:/conf/storm.yaml:ro
    - storm-data:/storm-data
  networks:
    - storm-net

services:
  # --- ZooKeeper -----------------------------------------------------------
  zookeeper:
    image: "zookeeper:${ZOOKEEPER_VERSION:-3.9}"
    container_name: storm-zookeeper
    restart: unless-stopped
    environment:
      ZOO_TICK_TIME: 2000
      ZOO_MAX_CLIENT_CNXNS: 60
    ports:
      - "${ZK_PORT:-2181}:2181"
    volumes:
      - zk-data:/data
      - zk-datalog:/datalog
    networks:
      - storm-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Nimbus (master) -----------------------------------------------------
  nimbus:
    <<: *storm-common
    container_name: storm-nimbus
    hostname: nimbus
    command: ["storm", "nimbus"]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${NIMBUS_THRIFT_PORT:-6627}:6627"
    healthcheck:
      test: ["CMD-SHELL", "storm list 2>&1 | grep -qvE 'Exception|error'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # --- Storm UI ------------------------------------------------------------
  ui:
    <<: *storm-common
    container_name: storm-ui
    command: ["storm", "ui"]
    depends_on:
      nimbus:
        condition: service_healthy
    ports:
      - "${STORM_UI_PORT:-9090}:8080"

  # --- Supervisor (worker node) --------------------------------------------
  supervisor:
    <<: *storm-common
    container_name: storm-supervisor-1
    command: ["storm", "supervisor"]
    depends_on:
      nimbus:
        condition: service_healthy

  # --- Log Viewer (access worker logs via UI) ------------------------------
  logviewer:
    <<: *storm-common
    container_name: storm-logviewer
    command: ["storm", "logviewer"]
    depends_on:
      - supervisor
    ports:
      - "${LOGVIEWER_PORT:-8000}:8000"

volumes:
  storm-data:
  zk-data:
  zk-datalog:

networks:
  storm-net:
    external: true
